<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dziękujemy | Sosnowe Chwile Pellet</title>
  <meta name="description" content="Dziękujemy za Twoje zapytanie o pellet. Wkrótce się z Tobą skontaktujemy." />
  <style>
    :root{
      --green:#2f5d3a;
      --green-dark:#23472c;
      --accent:#e08a2e;
      --bg:#f6f7f3;
      --text:#1f2933;
      --muted:#5b6770;
      --card:#fff;
      --border:#d9e1d8;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:var(--bg);
      line-height:1.6;
    }
    .container{
      width:min(1120px,calc(100% - 32px));
      margin:0 auto;
    }
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 0;
    }
    .card{
      width:min(760px,100%);
      background:#fff;
      border:1px solid var(--border);
      border-radius:22px;
      padding:40px 28px;
      box-shadow:0 10px 28px rgba(20,30,25,.08);
      text-align:center;
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(32px,4vw,52px);
      color:var(--green-dark);
      line-height:1.1;
    }
    p{
      margin:0 0 18px;
      color:var(--muted);
      font-size:18px;
    }
    .btn{
      display:inline-block;
      text-decoration:none;
      background:var(--accent);
      color:#fff;
      padding:14px 22px;
      border-radius:12px;
      font-weight:700;
      margin-top:8px;
    }
    .meta{
      margin-top:22px;
      font-size:15px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="container">
      <section class="card">
        <h1>Dziękujemy za Twoje zgłoszenie!</h1>
        <p>Otrzymaliśmy Twoje zapytanie o pellet. Wkrótce skontaktujemy się z Tobą w sprawie wyceny i terminu dostawy.</p>
        <p>Jeśli chcesz przyspieszyć kontakt, zadzwoń pod numer <strong>+48 793 573 900</strong>.</p>
        <a class="btn" href="/">Wróć na stronę główną</a>
        <div class="meta">
          Sosnowe Chwile Pellet — ciepło zamawiane wygodnie online.
        </div>
      </section>
    </div>
  </main>
</body>
</html>
