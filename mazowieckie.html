<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pellet drzewny Mazowieckie – dostawy hurtowe od 5 ton | Sosnowe Chwile</title>
  <meta name="description" content="Pellet drzewny z dostawą hurtową w województwie mazowieckim. Obsługujemy firmy, wspólnoty i obiekty usługowe w Warszawie i całym Mazowszu. Zamówienia od 5 ton." />
  <style>
    :root{
      --green:#2f5d3a;
      --green-dark:#23472c;
      --accent:#e08a2e;
      --bg:#f6f7f3;
      --text:#1f2933;
      --muted:#5b6770;
      --card:#fff;
      --border:#d9e1d8
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:var(--bg);
      line-height:1.6
    }
    .container{width:min(1120px,calc(100% - 32px));margin:0 auto}
    .topnav{
      background:var(--green-dark);
      padding:14px 0;
      position:sticky;
      top:0;
      z-index:100
    }
    .topnav .container{
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px
    }
    .topnav a.logo-link img{
      height:48px;
      background:#fff;
      padding:5px 8px;
      border-radius:8px;
      display:block
    }
    .topnav nav{display:flex;gap:16px;flex-wrap:wrap}
    .topnav nav a{
      color:#c8e6c9;
      text-decoration:none;
      font-size:14px;
      font-weight:700;
      transition:.2s
    }
    .topnav nav a:hover{color:#fff}
    .topnav .btn-phone{
      background:var(--accent);
      color:#fff;
      padding:9px 16px;
      border-radius:10px;
      font-weight:700;
      font-size:14px;
      text-decoration:none;
      white-space:nowrap
    }
    .hero{
      background:linear-gradient(rgba(18,33,20,.60),rgba(18,33,20,.60)),
                 url('1000042143.jpg') center/cover no-repeat;
      color:#fff;
      padding:72px 0 60px
    }
