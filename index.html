<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sosnowe Chwile Pellet | Pellet z dostawą</title>
  <meta name="description" content="Sprzedaż pelletu drzewnego premium z dostawą w całej Polsce. Cennik, oferta, szybki kontakt, płatność PayPal i kartą." />
  <style>
    :root{
      --green:#2f5d3a;
      --green-dark:#23472c;
      --accent:#e08a2e;
      --bg:#f6f7f3;
      --text:#1f2933;
      --muted:#5b6770;
      --card:#fff;
      --border:#d9e1d8
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:var(--bg);
      line-height:1.6
    }
    .container{width:min(1120px,calc(100% - 32px));margin:0 auto}
    .hero{
      position:relative;
      min-height:100svh;
      display:flex;
      align-items:center;
      color:#fff;
      background:linear-gradient(rgba(18,33,20,.58),rgba(18,33,20,.58)),url('1000042143.jpg') center/cover no-repeat
    }
    .hero-inner{padding:48px 0 40px;max-width:760px}
    .logo{
      height:72px;
      margin-bottom:22px;
      display:block;
      background:#fff;
      padding:8px 10px;
      border-radius:12px
    }
    .badge{
      display:inline-block;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.25);
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
      margin-bottom:18px;
      backdrop-filter:blur(6px)
    }
    h1{
      font-size:clamp(34px,5vw,64px);
      line-height:1.05;
      margin:0 0 16px;
      letter-spacing:-.02em;
      text-shadow:0 2px 14px rgba(0,0,0,.35)
    }
    .hero p{
      font-size:clamp(16px,2vw,20px);
      max-width:650px;
      color:rgba(255,255,255,.92);
      margin:0 0 28px;
      text-shadow:0 2px 10px rgba(0,0,0,.25)
    }
    .hero-actions{display:flex;gap:12px;flex-wrap:wrap}
    .btn{
      display:inline-block;
      text-decoration:none;
      border:none;
      cursor:pointer;
      padding:14px 22px;
      border-radius:12px;
      font-weight:700;
      transition:.2s ease;
      text-align:center
    }
    .btn-primary{background:var(--accent);color:#fff}
    .btn-secondary{
      background:transparent;
      color:#fff;
      border:1px solid rgba(255,255,255,.35)
    }
    .btn-whatsapp{
      background:#25D366;
      color:#fff;
      border:none;
      margin-top:10px;
      width:100%
    }
    .btn-whatsapp:hover{background:#1ebe5b}
    .section{padding:72px 0}
    .section h2{
      font-size:clamp(26px,3vw,40px);
      margin:0 0 14px;
      line-height:1.1
    }
    .section .lead{
      color:var(--muted);
      max-width:760px;
      margin:0 0 30px;
      font-size:18px
    }
    
    /* ===== REGION BUTTONS ===== */
    .region-section{background:#edf1eb; border-bottom: 1px solid var(--border);}
    .region-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));gap:14px;margin-top:20px}
    .btn-region{
      background:#fff;
      border:2px solid var(--border);
      padding:20px;
      border-radius:16px;
      text-align:center;
      font-weight:700;
      color:var(--text);
      text-decoration:none;
      transition:.2s;
    }
    .btn-region:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.05)}

    .pricing-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
      margin-top:24px
    }
    .pricing-card{
      background:#fff;
      border:1px solid #d9e1d8;
      border-radius:18px;
      padding:24px;
      box-shadow:0 8px 26px rgba(20,30,25,.05);
      display:flex;
      flex-direction:column
    }
    .price{
      font-size:28px;
      font-weight:800;
      color:var(--green-dark);
      margin:8px 0 12px
    }
    .muted{color:var(--muted); flex-grow:1; margin-bottom:15px}

    /* ===== FAQ ===== */
    .faq-section{padding:60px 0; background:#f9faf7;}
    .faq-item{border-radius:14px;background:#fff;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
    .faq-question{width:100%;text-align:left;padding:16px 20px;background:transparent;border:none;font-size:16px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
    .faq-icon{font-size:20px;color:var(--accent);transition:transform .25s;}
    .faq-answer{max-height:0;overflow:hidden;padding:0 20px;transition:max-height .25s ease,padding .25s ease;background:#fafbf8;}
    .faq-item.open .faq-answer{max-height:400px;padding:12px 20px 20px;border-top:1px solid #edf1eb;}
    .faq-item.open .faq-icon{transform:rotate(45deg);}

    .form-wrap{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px;}
    form{display:grid;gap:14px}
    input,textarea{width:100%;padding:14px 16px;border:1px solid #cfd8d2;border-radius:12px;font:inherit;}
    .footer{padding:40px 0;text-align:center;color:var(--muted);border-top:1px solid var(--border);background:#fff}

    @media (max-width:900px){
      .pricing-grid{grid-template-columns:1fr;gap:14px}
    }
    @media (max-width:520px){
      .hero-actions{flex-direction:column}
      .btn{width:100%;text-align:center}
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Jakie jest minimalne zamówienie pelletu?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Minimalne zamówienie to zwykle jedna paleta pelletu (około 1 tona)."
        }
      },
      {
        "@type": "Question",
        "name": "Ile trwa dostawa pelletu?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Standardowo od 2 do 5 dni roboczych od potwierdzenia zamówienia."
        }
      },
      {
        "@type": "Question",
        "name": "Jakie formy płatności są dostępne?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Możesz zapłacić online przez PayPal, kartą lub przelewem."
        }
      }
    ]
  }
  </script>
</head>
<body>
  <header class="hero">
    <div class="container hero-inner">
      <img src="logo-sosnowe-chwile.png" alt="Sosnowe Chwile" class="logo">
      <span class="badge">Pellet premium • Dostawa w całej Polsce</span>
      <h1>Sosnowe Chwile Pellet — wygodna sprzedaż opału online</h1>
      <p>Pellet drzewny w atrakcyjnej cenie, szybka wycena i płatność online.</p>
      <div class="hero-actions">
